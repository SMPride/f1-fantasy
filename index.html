// ─── OPENF1 DATA FETCHER ─────────────────────────────────────────────────────
// Fetches final positions from a session's position stream
async function fetchFinalPositions(API, sessionKey) {
  const res = await fetch(`${API}/position?session_key=${sessionKey}`);
  const positions = await res.json();
  const finalPos = {};
  for (const p of positions) finalPos[p.driver_number] = p.position;
  return finalPos; // { driverNumber -> position }
}

// Fetches best lap time per driver in a session (for quali pace signal)
async function fetchBestLaps(API, sessionKey) {
  const res = await fetch(`${API}/laps?session_key=${sessionKey}`);
  const laps = await res.json();
  const best = {}; // driverNum -> fastest lap_duration in seconds
  for (const lap of laps) {
    if (!lap.lap_duration) continue;
    const n = lap.driver_number;
    if (!best[n] || lap.lap_duration < best[n]) best[n] = lap.lap_duration;
  }
  return best;
}

async function fetchLiveForm(onStatus) {
  const API = "https://api.openf1.org/v1";
  const now = Date.now();

  onStatus("Connecting to OpenF1 API…");

  // ── 1. Fetch ALL sessions for 2026 (fall back to 2025) ──
  let allSessions = [];
  let dataYear = null;
  for (const yr of [2026, 2025]) {
    try {
      const r = await fetch(`${API}/sessions?year=${yr}`);
      const data = await r.json();
      if (data && data.length > 0) {
        allSessions = data.sort((a,b) => new Date(a.date_start)-new Date(b.date_start));
        dataYear = yr;
        onStatus(`Found ${allSessions.length} sessions in ${yr}`);
        break;
      }
    } catch(e) { /* try next */ }
  }

  if (allSessions.length === 0) {
    onStatus("No live data available — using seed data");
    return null;
  }

  const completed = s => s.date_end && new Date(s.date_end).getTime() < now;

  // ── 2. Split sessions by type ──
  const raceSessions    = allSessions.filter(s => s.session_name === "Race"             && completed(s));
  const sprintSessions  = allSessions.filter(s => s.session_name === "Sprint"           && completed(s));
  const sqSessions      = allSessions.filter(s => (s.session_name === "Sprint Shootout" || s.session_name === "Sprint Qualifying") && completed(s));
  const fp1Sessions     = allSessions.filter(s => s.session_name === "Practice 1"       && completed(s));
  const fp2Sessions     = allSessions.filter(s => s.session_name === "Practice 2"       && completed(s));
  const fp3Sessions     = allSessions.filter(s => s.session_name === "Practice 3"       && completed(s));
  const qualiSessions   = allSessions.filter(s => s.session_name === "Qualifying"       && completed(s));

  // ── 3. Load recent RACE form (last 8 races) ──
  const driverPts = {};
  const conPts    = {};
  const last8races = raceSessions.slice(-8);

  for (let i = 0; i < last8races.length; i++) {
    const sess = last8races[i];
    onStatus(`Race form ${i+1}/${last8races.length}: ${sess.country_name}…`);
    try {
      const finalPos = await fetchFinalPositions(API, sess.session_key);
      for (const [numStr, pos] of Object.entries(finalPos)) {
        const dId = NUM_TO_ID[parseInt(numStr)];
        if (!dId) continue;
        const pts = POS_PTS[pos] || 0;
        if (!driverPts[dId]) driverPts[dId] = [];
        driverPts[dId].push(pts);
        const drv = DRIVERS.find(d => d.id === dId);
        if (drv) {
          if (!conPts[drv.team]) conPts[drv.team] = [];
          const idx = driverPts[dId].length - 1;
          if (!conPts[drv.team][idx]) conPts[drv.team][idx] = 0;
          conPts[drv.team][idx] += pts;
        }
      }
    } catch(e) { console.warn("Race load failed:", e); }
  }

  // ── 4. Load CURRENT WEEKEND data ──
  // Always try 2026 first for weekend data, regardless of what year was used for form data
  const nextRaceCal = getNextRace();
  const nextRaceDate = new Date(nextRaceCal.date);
  const weekendStart = new Date(nextRaceDate.getTime() - 7*24*60*60*1000);
  const weekendEnd   = new Date(nextRaceDate.getTime() + 2*24*60*60*1000);

  // Try to fetch 2026 sessions separately if we fell back to 2025 for form data
  let weekendSessionPool = allSessions;
  if (dataYear === 2025) {
    try {
      onStatus("Checking for 2026 weekend sessions…");
      const r2026 = await fetch(`${API}/sessions?year=2026`);
      const d2026 = await r2026.json();
      if (d2026 && d2026.length > 0) {
        weekendSessionPool = [...allSessions, ...d2026];
        onStatus(`Found ${d2026.length} 2026 sessions`);
      }
    } catch(e) { /* stay with allSessions */ }
  }

  const weekendSessions = weekendSessionPool.filter(s => {
    const d = new Date(s.date_start);
    return d >= weekendStart && d <= weekendEnd;
  });
  onStatus(`Weekend sessions found: ${weekendSessions.length} (${weekendSessions.map(s=>s.session_name).join(", ")||"none"})`);

  // Weekend FP positions
  const weekendFpData = {}; // driverId -> { fp1, fp2, fp3 }
  DRIVERS.forEach(d => weekendFpData[d.id] = { fp1:"", fp2:"", fp3:"" });

  const fpMap = [
    { name:"Practice 1", key:"fp1" },
    { name:"Practice 2", key:"fp2" },
    { name:"Practice 3", key:"fp3" },
  ];
  for (const { name, key } of fpMap) {
    const fpSess = weekendSessions.find(s => s.session_name === name && completed(s));
    if (fpSess) {
      onStatus(`Loading ${name} (${fpSess.country_name})…`);
      try {
        const finalPos = await fetchFinalPositions(API, fpSess.session_key);
        for (const [numStr, pos] of Object.entries(finalPos)) {
          const dId = NUM_TO_ID[parseInt(numStr)];
          if (dId && weekendFpData[dId]) weekendFpData[dId][key] = String(pos);
        }
      } catch(e) { console.warn(`${name} load failed:`, e); }
    }
  }

  // Sprint Shootout / Sprint Qualifying pace signal (best lap rank → position)
  const weekendSqSess = weekendSessions.find(s => (s.session_name === "Sprint Shootout" || s.session_name === "Sprint Qualifying") && completed(s));
  let sqPositions = null; // driverId -> grid pos (1=fastest)
  if (weekendSqSess) {
    onStatus(`Loading Sprint Quali (${weekendSqSess.country_name})…`);
    try {
      const bestLaps = await fetchBestLaps(API, weekendSqSess.session_key);
      // Rank by best lap time
      const ranked = Object.entries(bestLaps).sort((a,b) => a[1]-b[1]);
      sqPositions = {};
      ranked.forEach(([num, _], idx) => {
        const dId = NUM_TO_ID[parseInt(num)];
        if (dId) sqPositions[dId] = idx + 1;
      });
    } catch(e) { console.warn("Sprint quali load failed:", e); }
  }

  // Sprint Race positions → add to FP data as extra signal (use fp3 slot if empty)
  const weekendSprintSess = weekendSessions.find(s => s.session_name === "Sprint" && completed(s));
  let sprintPositions = null;
  if (weekendSprintSess) {
    onStatus(`Loading Sprint Race (${weekendSprintSess.country_name})…`);
    try {
      sprintPositions = await fetchFinalPositions(API, weekendSprintSess.session_key);
      // If fp3 is empty for a driver and we have sprint data, fill it
      for (const [numStr, pos] of Object.entries(sprintPositions)) {
        const dId = NUM_TO_ID[parseInt(numStr)];
        if (dId && weekendFpData[dId] && weekendFpData[dId].fp3 === "") {
          weekendFpData[dId].fp3 = String(pos); // Sprint result as pace proxy
        }
      }
    } catch(e) { console.warn("Sprint load failed:", e); }
  }

  // Qualifying (main) pace signal
  const weekendQualiSess = weekendSessions.find(s => s.session_name === "Qualifying" && completed(s));
  let qualiPositions = null;
  if (weekendQualiSess) {
    onStatus(`Loading Qualifying (${weekendQualiSess.country_name})…`);
    try {
      const bestLaps = await fetchBestLaps(API, weekendQualiSess.session_key);
      const ranked = Object.entries(bestLaps).sort((a,b) => a[1]-b[1]);
      qualiPositions = {};
      ranked.forEach(([num,_], idx) => {
        const dId = NUM_TO_ID[parseInt(num)];
        if (dId) qualiPositions[dId] = idx + 1;
      });
    } catch(e) { console.warn("Quali load failed:", e); }
  }

  // Count what weekend data we got
  const fpLoaded = fpMap.filter(({ key }) => Object.values(weekendFpData).some(fp => fp[key] !== ""));
  const hasWeekendData = fpLoaded.length > 0 || sqPositions || weekendSprintSess || qualiPositions;

  onStatus("Building form arrays…");
  return {
    driverPts, conPts,
    raceCount: last8races.length,
    weekendFpData,       // auto-populate practice panel
    sqPositions,         // sprint quali rank (driverId -> pos)
    qualiPositions,      // main quali rank (driverId -> pos)
    sprintPositions,     // sprint race final pos (driverNum -> pos)
    hasWeekendData,
    dataYear,
    weekendSessionsFound: weekendSessions.map(s => s.session_name).filter((v,i,a)=>a.indexOf(v)===i),
  };
}

// ─── BUILD DRIVER/CONSTRUCTOR OBJECTS WITH FORM ───────────────────────────────
function buildAssets(liveData) {
  const drivers = DRIVERS.map(d => {
    let form;
    if (liveData && liveData.driverPts[d.id] && liveData.driverPts[d.id].length > 0) {
      form = liveData.driverPts[d.id];
    } else {
      form = SEED_DRIVER[d.id] || new Array(11).fill(0);
    }
    return { ...d, form, liveRaces: liveData ? (liveData.driverPts[d.id] || []).length : 0 };
  });

  const cons = CONSTRUCTORS.map(c => {
    let form;
    if (liveData && liveData.conPts[c.name] && liveData.conPts[c.name].length > 0) {
      form = liveData.conPts[c.name];
    } else {
      form = SEED_CON[c.name] || new Array(11).fill(0);
    }
    return { ...c, form, liveRaces: liveData ? (liveData.conPts[c.name] || []).length : 0 };
  });

  // Build weekend fpData: API data takes priority, fall back to hardcoded
  let weekendFpData = Object.fromEntries(DRIVERS.map(d => [d.id, { fp1:"", fp2:"", fp3:"" }]));
  let weekendSessions = [];
  let weekendSource = "none";

  if (liveData) {
    if (liveData.weekendFpData) weekendFpData = JSON.parse(JSON.stringify(liveData.weekendFpData));
    weekendSessions = liveData.weekendSessionsFound || [];
    if (liveData.qualiPositions) {
      for (const [dId, pos] of Object.entries(liveData.qualiPositions)) {
        if (weekendFpData[dId]) weekendFpData[dId].fp1 = String(pos);
      }
    }
    if (liveData.sqPositions) {
      for (const [dId, pos] of Object.entries(liveData.sqPositions)) {
        if (weekendFpData[dId] && weekendFpData[dId].fp2 === "") weekendFpData[dId].fp2 = String(pos);
      }
    }
    weekendSource = "api";
  }

  // If API returned no weekend session data, use hardcoded fallback for current race
  const apiHasWeekendData = Object.values(weekendFpData).some(fp => fp.fp1 || fp.fp2 || fp.fp3);
  if (!apiHasWeekendData && HARDCODED_WEEKEND) {
    const nextR = getNextRace();
    if (nextR.country === HARDCODED_WEEKEND.meeting || nextR.name.includes(HARDCODED_WEEKEND.meeting)) {
      weekendFpData = JSON.parse(JSON.stringify(HARDCODED_WEEKEND.fpData));
      weekendSessions = HARDCODED_WEEKEND.sessions;
      weekendSource = "hardcoded";
    }
  }

  return { drivers, cons, weekendFpData, weekendSessions, weekendSource };
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getNextRace() {
  const now = Date.now();
  return CALENDAR.find(r => new Date(r.date).getTime() > now) || CALENDAR[CALENDAR.length-1];
}

function fpPosToSignal(pos) {
  if (!pos || pos < 1 || pos > 20) return null;
  return (20 - pos) / 19;
}
function practiceSignal(fp) {
  const vals = [fp.fp1, fp.fp2, fp.fp3].map(v => fpPosToSignal(parseInt(v))).filter(v => v !== null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

// ─── ML SCORE ─────────────────────────────────────────────────────────────────
const WEIGHTS = {
  balanced:   { form:0.35, cons:0.25, quali:0.20, avg:0.20 },
  highRisk:   { form:0.55, cons:0.10, quali:0.20, avg:0.15 },
  consistent: { form:0.20, cons:0.45, quali:0.15, avg:0.20 },
  value:      { form:0.25, cons:0.25, quali:0.20, avg:0.30 },
};

function mlScore(asset, w, country, fpSignal=null, practiceBlend=0) {
  const form   = asset.form || [];
  const recent = form.slice(-3);
  const fAvg   = recent.length ? recent.reduce((a,b)=>a+b,0)/recent.length : 0;
  const fMax   = Math.max(...form, 1);
  const allAvg = form.length ? form.reduce((a,b)=>a+b,0)/form.length : 0;
  let sig = w.form*(fAvg/fMax) + w.cons*asset.cons + w.quali*asset.quali + w.avg*(allAvg/30);
  if (fpSignal !== null && practiceBlend > 0) {
    const fpS = 0.3 + fpSignal * 0.6;
    sig = sig*(1-practiceBlend) + fpS*practiceBlend;
  }
  const bias = BIAS[country] || {};
  const tb = (bias.t && bias.t[asset.team]) || 1;
  const db = (bias.d && bias.d[asset.id])   || 1;
  return Math.round(sig * 55 * tb * db * 10) / 10;
}

// ─── OPTIMIZER ────────────────────────────────────────────────────────────────
function optimize(drivers, cons, budget, strategy, country, fpData={}, practiceBlend=0) {
  const W = WEIGHTS[strategy] || WEIGHTS.balanced;
  function conFpSig(cName) {
    const sigs = drivers.filter(d=>d.team===cName)
      .map(d=>practiceSignal(fpData[d.id]||{})).filter(v=>v!==null);
    return sigs.length ? sigs.reduce((a,b)=>a+b,0)/sigs.length : null;
  }
  const sd = drivers.map(d => ({ ...d, s: mlScore(d, W, country, practiceSignal(fpData[d.id]||{}), practiceBlend) }));
  const sc = cons.map(c    => ({ ...c, s: mlScore(c, W, country, conFpSig(c.name), practiceBlend) }));

  let best=null, bestScore=-Infinity;
  for (let i=0;i<sc.length;i++) for (let j=i+1;j<sc.length;j++) {
    const c1=sc[i], c2=sc[j], dBudget=budget-c1.price-c2.price;
    if (dBudget<0) continue;
    const aff=sd.filter(d=>d.price<=dBudget);
    if (aff.length<5) continue;
    const n=aff.length;
    for (let a=0;a<n-4;a++) for (let b=a+1;b<n-3;b++) for (let c=b+1;c<n-2;c++)
      for (let d=c+1;d<n-1;d++) for (let e=d+1;e<n;e++) {
        const dCost=aff[a].price+aff[b].price+aff[c].price+aff[d].price+aff[e].price;
        if (dCost>dBudget+0.01) continue;
        const total=aff[a].s+aff[b].s+aff[c].s+aff[d].s+aff[e].s+c1.s+c2.s;
        if (total>bestScore) { bestScore=total; best={ drivers:[aff[a],aff[b],aff[c],aff[d],aff[e]], constructors:[c1,c2], totalScore:total, totalCost:dCost+c1.price+c2.price, left:budget-dCost-c1.price-c2.price, W }; }
      }
  }
  return best;
}

                    {isNext&&<span style={{ fontSize:9, background:"#E1060022", border:"1px solid #E10600", color:"#E10600", padding:"1px 5px", borderRadius:3 }}>NEXT</span>}
                    {isPast&&<span style={{ fontSize:9, background:"#00e67622", border:"1px solid #00e67644", color:"#00e676", padding:"1px 5px", borderRadius:3 }}>✓ DONE</span>}
                    <span style={{ fontSize:10, background:"#1c1c2a", color:"#444", padding:"2px 7px", borderRadius:4 }}>{new Date(r.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>
                  </div>
                </div>
                <div style={{ fontSize:15, fontWeight:700, marginBottom:2 }}>{r.flag} {r.name}</div>
                <div style={{ fontSize:11, color:"#444", marginBottom:6 }}>{r.circuit}</div>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  <span style={{ fontSize:10, background:"#1c1c2a", color:r.street?"#ff9800":"#4caf50", padding:"2px 6px", borderRadius:4 }}>{r.street?"🏙 Street":"🏁 Permanent"}</span>
                  {topTeam&&<span style={{ fontSize:10, background:`${TCOL[topTeam[0]]||"#888"}22`, color:TCOL[topTeam[0]]||"#888", padding:"2px 6px", borderRadius:4 }}>⭐ {topTeam[0]}</span>}
                </div>
              </div>;
            })}
          </div>
        </div>}

        {/* ══ ANALYSIS ══ */}
        {tab==="analysis" && <div className="fu">
          <div style={{ background:"#0d0d14", border:"1px solid #1c1c2a", borderRadius:11, padding:"12px 16px", marginBottom:12, display:"flex", gap:20, flexWrap:"wrap", alignItems:"center" }}>
            <div><div style={{ fontSize:10, color:"#555", marginBottom:2 }}>DATA SOURCE</div><div style={{ fontSize:13, fontWeight:700, color:liveRaceCount>0?"#00e676":"#ff9800" }}>{liveRaceCount>0?"OpenF1 API (live)":"Seed data (2025 season)"}</div></div>
            <div><div style={{ fontSize:10, color:"#555", marginBottom:2 }}>RACES IN MODEL</div><div style={{ fontSize:13, fontWeight:700 }}>{liveRaceCount>0?liveRaceCount:"11"} races</div></div>
            {fetchedAt&&<div><div style={{ fontSize:10, color:"#555", marginBottom:2 }}>LAST FETCHED</div><div style={{ fontSize:13, fontWeight:700 }}>{fetchedAt.toLocaleString()}</div></div>}
            <div><div style={{ fontSize:10, color:"#555", marginBottom:2 }}>NEXT RACE</div><div style={{ fontSize:13, fontWeight:700, color:"#E10600" }}>{nextRace.flag} {nextRace.name}</div></div>
            <button onClick={loadLiveData} disabled={apiStatus==="loading"} style={{ marginLeft:"auto", background:"#E1060015", border:"1px solid #E10600", color:"#E10600", padding:"7px 14px", borderRadius:6, cursor:"pointer", fontWeight:700, fontSize:12 }}>↻ Refresh Data</button>
            <button onClick={()=>setShowDebug(v=>!v)} style={{ background:"transparent", border:"1px solid #252535", color:"#444", padding:"7px 12px", borderRadius:6, cursor:"pointer", fontSize:11 }}>🔍 {showDebug?"Hide":"Show"} API Log</button>
          </div>

          {showDebug && (
            <div style={{ background:"#07070f", border:"1px solid #1c1c2a", borderRadius:10, padding:"12px 16px", marginBottom:12, fontFamily:"monospace", fontSize:11 }}>
              <div style={{ color:"#555", marginBottom:8, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:1 }}>🔍 API FETCH LOG</div>
              {debugLog.length === 0 && <div style={{ color:"#444" }}>No log yet — hit Refresh Data first</div>}
              {debugLog.map((msg,i) => (
                <div key={i} style={{ color:msg.toLowerCase().includes("none")||msg.includes("0 (")||msg.includes("0 session")?
                  "#ff9800":msg.toLowerCase().includes("error")||msg.toLowerCase().includes("fail")?"#ff5252":"#4caf50",
                  marginBottom:3, lineHeight:1.4 }}>› {msg}</div>
              ))}
              {weekendInfo.sessions.length===0 && debugLog.length>0 && (
                <div style={{ color:"#ff9800", marginTop:8, padding:"8px", background:"#ff980011", borderRadius:5 }}>
                  ⚠ No weekend sessions found. OpenF1 likely hasn't published 2026 China sessions yet.
                  They usually appear within a few hours of FP1 ending. Try refreshing later tonight.
                </div>
              )}
            </div>
          )}

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            <div style={{ background:"#0d0d14", border:"1px solid #1c1c2a", borderRadius:11, padding:"15px" }}>
              <div style={{ fontSize:11, color:"#E10600", fontWeight:700, letterSpacing:1, marginBottom:11 }}>💰 TOP VALUE (PPM) · {nextRace.flag} {nextRace.name}</div>
              {drivers.map(d=>({...d,ppm:Math.round(scoreOf(d)/d.price*100)/100})).sort((a,b)=>b.ppm-a.ppm).slice(0,10).map((d,i)=>(
                <div key={d.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <span style={{ color:"#333", fontSize:11, width:18 }}>#{i+1}</span>
                  <div style={{ flex:1, fontSize:13, fontWeight:600 }}>{d.name}</div>
                  <span style={{ fontSize:10, color:TCOL[d.team]||"#888" }}>{d.team}</span>
                  <div style={{ width:55, height:4, background:"#1c1c2a", borderRadius:2, overflow:"hidden" }}><div style={{ height:"100%", width:`${Math.min(100,d.ppm*55)}%`, background:"#00e676", borderRadius:2 }}/></div>
                  <span style={{ color:"#00e676", fontWeight:700, fontSize:12, width:32, textAlign:"right" }}>{d.ppm}</span>
                </div>
              ))}
            </div>
            <div style={{ background:"#0d0d14", border:"1px solid #1c1c2a", borderRadius:11, padding:"15px" }}>
              <div style={{ fontSize:11, color:"#E10600", fontWeight:700, letterSpacing:1, marginBottom:11 }}>📈 LIVE FORM — last 5 races avg</div>
              {drivers.map(d=>({...d,avg5:d.form.slice(-5).reduce((a,b)=>a+b,0)/Math.min(5,d.form.length)})).sort((a,b)=>b.avg5-a.avg5).slice(0,10).map((d,i)=>(
                <div key={d.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                  <span style={{ color:"#333", fontSize:11, width:18 }}>#{i+1}</span>
                  <div style={{ flex:1, fontSize:13, fontWeight:600 }}>{d.name}</div>
                  <div style={{ width:52 }}><Bar vals={d.form.slice(-5)} color={TCOL[d.team]}/></div>
                  <span style={{ color:"#ffeb3b", fontWeight:700, fontSize:12, width:36, textAlign:"right" }}>{d.avg5.toFixed(1)}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ background:"#0d0d14", border:"1px solid #1c1c2a", borderRadius:11, padding:"15px", marginBottom:12 }}>
            <div style={{ fontSize:11, color:"#E10600", fontWeight:700, letterSpacing:1, marginBottom:11 }}>📊 FULL DRIVER TABLE — {nextRace.flag} {nextRace.name}</div>
            <div style={{ display:"grid", gridTemplateColumns:"22px 1fr 95px 55px 62px 48px 52px 65px", gap:"0 8px", padding:"0 0 7px", borderBottom:"1px solid #1c1c2a", marginBottom:3 }}>
              {["#","Driver","Team","Price","Score","PPM","Tier","Form"].map(h=><div key={h} style={{ fontSize:9, color:"#333", fontWeight:700, textTransform:"uppercase" }}>{h}</div>)}
            </div>
            {drivers.map(d=>({...d,s:scoreOf(d),ppm:Math.round(scoreOf(d)/d.price*100)/100})).sort((a,b)=>b.s-a.s).map((d,i)=>(
              <div key={d.id} style={{ display:"grid", gridTemplateColumns:"22px 1fr 95px 55px 62px 48px 52px 65px", gap:"0 8px", padding:"6px 0", borderBottom:"1px solid #0d0d14", alignItems:"center" }}>
                <span style={{ color:"#333", fontSize:11 }}>{i+1}</span>
                <div style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ fontWeight:600, fontSize:13 }}>{d.name}</span><LiveBadge n={d.liveRaces||0}/></div>
                <span style={{ color:TCOL[d.team]||"#888", fontSize:10 }}>{d.team}</span>
                <span style={{ fontSize:12, fontWeight:600 }}>${d.price}M</span>
                <Pill v={d.s}/>
                <span style={{ color:d.ppm>=1.2?"#00e676":d.ppm>=0.9?"#ffeb3b":"#ff9800", fontWeight:700, fontSize:12 }}>{d.ppm}</span>
                <span style={{ fontSize:10, background:`${TIER_C[d.tier]}22`, color:TIER_C[d.tier], padding:"1px 4px", borderRadius:3, textAlign:"center" }}>{d.tier}</span>
                <Bar vals={d.form} color={TCOL[d.team]}/>
              </div>
            ))}
          </div>

          <div style={{ background:"#0d0d14", border:"1px solid #1c1c2a", borderRadius:11, padding:"15px" }}>
            <div style={{ fontSize:11, color:"#E10600", fontWeight:700, letterSpacing:1, marginBottom:11 }}>📋 SCORING RULES</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))", gap:7 }}>
              {[{l:"Win (P1)",pts:"+25",c:"#FFD700"},{l:"P2",pts:"+18",c:"#C0C0C0"},{l:"P3",pts:"+15",c:"#CD7F32"},{l:"P4–P10",pts:"+12→+1",c:"#888"},{l:"Pole Position",pts:"+10",c:"#E10600"},{l:"Driver of Day",pts:"+10",c:"#FF8C00"},{l:"Fastest Lap",pts:"+5",c:"#00BCD4"},{l:"Fast Pit Stop",pts:"+5 (con)",c:"#4CAF50"},{l:"Position Gained",pts:"+2 each",c:"#8BC34A"},{l:"DNF",pts:"−15",c:"#f44336"},{l:"DSQ (Constructor)",pts:"−20",c:"#E91E63"},{l:"DRS Boost",pts:"×2 driver",c:"#FF8C00"}].map(r=>(
                <div key={r.l} style={{ background:"#111120", borderRadius:6, padding:"8px 11px", display:"flex", justifyContent:"space-between" }}>
                  <span style={{ fontSize:11, color:"#666" }}>{r.l}</span>
                  <span style={{ color:r.c, fontWeight:700, fontSize:13 }}>{r.pts}</span>
                </div>
              ))}
            </div>
          </div>
        </div>}
      </div>

      <div style={{ borderTop:"1px solid #111120", padding:"11px 20px", display:"flex", justifyContent:"space-between", fontSize:10, color:"#2a2a3e", marginTop:18 }}>
        <span>F1 Fantasy AI · 2026 season · R2 China updated · 20-race calendar (Bahrain &amp; Saudi cancelled)</span>
        <span>Not affiliated with Formula 1 · $100M cap · 5 drivers + 2 constructors</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
